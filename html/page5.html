<!DOCTYPE html>
<html lang = "vi">
<head>
      <meta charset = "utf-8">
      <title>Tính diện tích hình chữ nhật</title>
	  <link href="../css/style.css" rel="stylesheet">
</head>
   <body>
       <script> 
            // Nhập chiều dài
            let d = Number(prompt("Nhập vào chiều dài : "));
            let r;

            // Nhập chiều rộng
            do{
                r= Number(prompt("Nhập vào chiều rộng:"));
                if(r>d)
                   alert("nhập lại chiều rộng cưng oi......");
            }while(r>d);
           
            // Nếu chiều rộng = chiều dài thì diện tích hình vuông
            if(r==d);
            {
                alert(`Trường hợp đặt biệt:Diện tích hình vuông có cạnh ${d} cm là ${d*r} cm^2`)
            }
           else
            // Nếu chiều rộng nhỏ hơn chiều dài thì diện tích hình chữ nhật
          {
            alert(`Dện tích hình chữ nhật có chiều dài ${d} cm và chiều rộng ${d*r} cm^2`);
          }

	    </script>
   </body>
</html>
